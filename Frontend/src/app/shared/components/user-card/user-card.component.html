<div class="user-card flex-al-ce flex-jus-sb g-20">
    <div class="flex-al-ce g-16">
        <div class="user-avatar flex-jus-ce flex-al-ce" [class.avatar-locked]="user.isLocked">
            <span class="std-header-font avatar-text">{{ getInitials(user.name) }}</span>
        </div>
        <div class="flex-dir g-6">
            <h3 class="font-16 font-w-600 std-header-font">{{ user.name }}</h3>
            <p class="std-tagline-font color-grey card-email">{{ user.email }}</p>
            <div class="flex-al-ce g-8">
                <span class="role-badge std-tagline-font">{{ user.role | titlecase }}</span>
                <span class="status-badge" [ngClass]="user.isActive ? 'badge-active' : 'badge-inactive'">
                    {{ user.isActive ? 'Active' : 'Inactive' }}
                </span>
                @if(user.isLocked) {
                <span class="status-badge badge-locked">Locked</span>
                }
            </div>
        </div>
    </div>

    <div class="flex-al-ce g-16">
        <p class="std-tagline-font color-grey card-date">{{ user.createdAt | date:'dd MMM yyyy' }}</p>
        @if(showLockButton) {
        <button class="lock-btn" [class.btn-unlock]="user.isLocked" (click)="onLockUser()">
            {{ user.isLocked ? 'Unlock' : 'Lock' }}
        </button>
        }
    </div>
</div>
